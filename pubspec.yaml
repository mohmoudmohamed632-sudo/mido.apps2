name: restaurant_system
description: "Complete 3-App Restaurant System - Customer, Delivery & Admin"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ===== UI & Responsive =====
  flutter_screenutil: ^5.9.3
  responsive_framework: ^1.5.1
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

  # ===== State Management =====
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  get_it: ^7.7.0
  injectable: ^2.4.2

  # ===== Firebase =====
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.2
  firebase_storage: ^12.1.0
  firebase_messaging: ^15.0.2
  firebase_analytics: ^11.1.0
  firebase_crashlytics: ^4.0.2

  # ===== Maps & Location =====
  google_maps_flutter: ^2.7.0
  google_maps_flutter_web: ^0.5.8
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  flutter_polyline_points: ^2.1.0

  # ===== Payments =====
  flutter_stripe: ^10.2.0
  pay: ^2.0.0
  in_app_purchase: ^3.2.0

  # ===== Image Picker =====
  image_picker: ^1.1.2
  image_cropper: ^7.0.5
  cached_network_image: ^3.3.1
  photo_view: ^0.15.0

  # ===== AI =====
  google_generative_ai: ^0.4.3
  speech_to_text: ^6.6.2
  flutter_tts: ^4.0.2

  # ===== Accessibility =====
  accessibility_tools: ^2.2.2
  flutter_accessibility_service: ^0.2.5

  # ===== Charts & Reports =====
  fl_chart: ^0.68.0
  syncfusion_flutter_charts: ^26.1.35
  syncfusion_flutter_datagrid: ^26.1.35
  pdf: ^3.10.8
  printing: ^5.13.1

  # ===== Notifications =====
  flutter_local_notifications: ^17.2.1
  awesome_notifications: ^0.9.3

  # ===== Utils =====
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  path_provider: ^2.1.3
  dio: ^5.5.0+1
  retrofit: ^4.1.0
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1
  riverpod: ^2.5.1
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5

  # ===== Icons =====
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0
  flutter_vector_icons: ^2.0.0

  # ===== QR & Barcode =====
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1

  # ===== Animation =====
  flutter_spinkit: ^5.2.1
  liquid_pull_to_refresh: ^3.0.1
  pull_to_refresh: ^2.0.0

  # ===== Web Support =====
  universal_html: ^2.2.4
  flutter_web_plugins:
    sdk: flutter

dependency_overrides:
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  retrofit_generator: ^8.1.0
  injectable_generator: ^2.6.1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0
  change_app_package_name: ^1.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/animations/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"

flutter_native_splash:
  color: "#1A1A2E"
  image: assets/images/splash_logo.png
  android: true
  ios: true
  web: true
